openapi: 3.1.0
info:
  title: Carpool & Parking Management API
  version: 1.0.0
  description: >
    Session-authenticated JSON API backing dashboard visualizations,
    carpool operations, reservation utilities, and administrative insights.
servers:
  - url: /api
security:
  - cookieAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Flask-Login session cookie authentication
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [administrator, user, guest] }
        created_at: { type: string, format: date-time }
    ParkingSpot:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [available, reserved, maintenance] }
        location: { type: string }
        description: { type: string, nullable: true }
        is_available: { type: boolean }
    Reservation:
      type: object
      properties:
        id: { type: integer }
        spot_id: { type: string }
        user_id: { type: integer }
        name: { type: string }
        reservation_date: { type: string, format: date }
        status: { type: string, enum: [active, cancelled, completed] }
        is_future: { type: boolean }
        can_cancel: { type: boolean }
    Carpool:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        origin: { type: string }
        destination: { type: string }
        departure_time: { type: string, format: date-time }
        return_time: { type: string, format: date-time, nullable: true }
        max_passengers: { type: integer }
        current_passengers: { type: integer }
        available_seats: { type: integer }
        organizer_id: { type: integer }
        organizer_username: { type: string, nullable: true }
        can_join: { type: boolean }
    Action:
      type: object
      properties:
        id: { type: integer }
        action_type: { type: string }
        username: { type: string }
        timestamp: { type: string, format: date-time }
        details: { type: string, nullable: true }
    DashboardStats:
      type: object
      properties:
        reservations:
          type: object
          properties:
            total_reservations: { type: integer }
            future_reservations: { type: integer }
            today_reservations: { type: integer }
            total_spots: { type: integer }
            available_spots: { type: integer }
            utilization_rate: { type: number }
        carpools:
          type: object
          properties:
            total_carpools: { type: integer }
            future_carpools: { type: integer }
            today_carpools: { type: integer }
            occupancy_rate: { type: number }
        user:
            type: object
            properties:
              reservations: { type: integer }
              carpools: { type: integer }
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean }
        error: { type: string }
paths:
  /dashboard-stats:
    get:
      summary: Get combined dashboard statistics
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Statistics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/DashboardStats' }
        '500':
          description: Error fetching stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /available-spots/{date}:
    get:
      summary: Get available parking spots for a date
      parameters:
        - in: path
          name: date
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Available spots
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  date: { type: string }
                  available_spots:
                    type: array
                    items: { $ref: '#/components/schemas/ParkingSpot' }
                  count: { type: integer }
        '400':
          description: Format error
        '500':
          description: Server error

  /reservations-chart-data:
    get:
      summary: Get reservation counts over last 7 days
      responses:
        '200':
          description: Chart dataset
        '500':
          description: Failure

  /carpools-chart-data:
    get:
      summary: Get carpool counts for next 7 days
      responses:
        '200': { description: Dataset }
        '500': { description: Failure }

  /carpool/{carpool_id}/join:
    post:
      summary: Join a carpool
      parameters:
        - in: path
          name: carpool_id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Joined
        '400':
          description: Join disallowed
        '404':
          description: Not found
        '500':
          description: Error

  /carpool/{carpool_id}/leave:
    post:
      summary: Leave a carpool
      parameters:
        - in: path
          name: carpool_id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Left }
        '400': { description: Disallowed }
        '404': { description: Not found }

  /admin/activity-chart-data:
    get:
      summary: Admin activity trend
      parameters:
        - in: query
          name: days
          schema: { type: integer, default: 7 }
      responses:
        '200': { description: Activity dataset }
        '403': { description: Unauthorized }
        '500': { description: Error }

  /admin/system-stats:
    get:
      summary: Full system statistics
      responses:
        '200': { description: Stats }
        '403': { description: Unauthorized }

  /quick-reservation:
    post:
      summary: Create reservation for today quickly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, spot_id]
              properties:
                name: { type: string }
                spot_id: { type: string }
      responses:
        '200': { description: Created }
        '400': { description: Validation failure }
        '403': { description: Permission denied }

  /user-activity:
    get:
      summary: Recent user actions (self)
      responses:
        '200':
          description: Recent actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Action' }

  /dashboard/stats:
    get:
      summary: Real-time core summary
      responses:
        '200': { description: Stats snapshot }

  /dashboard/reservations-trend:
    get:
      summary: Reservations creation trend
      responses:
        '200': { description: Series }

  /dashboard/parking-utilization:
    get:
      summary: Current parking occupancy breakdown
      responses:
        '200': { description: Pie dataset }

  /dashboard/carpool-activity:
    get:
      summary: Carpool creation trend
      responses:
        '200': { description: Series }

  /dashboard/weekly-stats:
    get:
      summary: Combined weekly reservations & carpools
      responses:
        '200': { description: Dual series }

  /dashboard/recent-activity:
    get:
      summary: Last 10 action feed
      responses:
        '200': { description: Activity list }

  /health-check:
    get:
      summary: Health probe
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  timestamp: { type: string }
                  version: { type: string }
        '500': { description: Unhealthy }

  /error-report:
    post:
      summary: Client error submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Accepted }
        '500': { description: Error }

  /access-denied-log:
    post:
      summary: Log unauthorized attempt (analytics)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                user_agent: { type: string }
      responses:
        '200': { description: Logged }
        '500': { description: Failure }

tags:
  - name: Dashboard
  - name: Reservations
  - name: Carpools
  - name: Admin
  - name: System

x-notes:
  inconsistencies:
    - Carpool passenger identity not modeled (only counters).
    - Action model referenced with extra fields in profile update (not present).
